<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godoy — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --marrom: #3d1f0a;
    --caramelo: #c17f3a;
    --creme: #fdf6ed;
    --branco: #ffffff;
    --cinza: #8a7f75;
    --verde: #2d6a4f;
    --vermelho: #c1392b;
    --amarelo: #e8a020;
    --azul: #1a5276;
    --laranja: #e67e22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--creme);
    color: var(--marrom);
    min-height: 100vh;
  }

  header {
    background: var(--marrom);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(61,31,10,0.3);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    color: var(--caramelo);
    font-size: 24px;
    letter-spacing: 1px;
  }

  .logo span {
    color: var(--branco);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    display: block;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .btn-atualizar {
    background: var(--caramelo);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
  }

  .btn-atualizar:hover { background: #a66d2e; }

  .data-hora {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 24px 32px;
  }

  .stat-card {
    background: white;
    border-radius: 16px;
    padding: 20px 24px;
    border-left: 4px solid var(--caramelo);
    box-shadow: 0 2px 12px rgba(61,31,10,0.08);
  }

  .stat-card.aguardando { border-color: var(--amarelo); }
  .stat-card.confirmado { border-color: var(--verde); }
  .stat-card.pronto { border-color: var(--azul); }
  .stat-card.entregue { border-color: var(--cinza); }

  .stat-numero {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: var(--marrom);
    line-height: 1;
  }

  .stat-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--cinza);
    margin-top: 6px;
    font-weight: 500;
  }

  .filtros {
    padding: 0 32px 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filtro-btn {
    padding: 8px 18px;
    border-radius: 100px;
    border: 2px solid var(--marrom);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    color: var(--marrom);
    transition: all 0.2s;
  }

  .filtro-btn.ativo, .filtro-btn:hover {
    background: var(--marrom);
    color: white;
  }

  .pedidos-container {
    padding: 0 32px 32px;
    display: grid;
    gap: 16px;
  }

  .pedido-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(61,31,10,0.06);
    border: 1px solid rgba(61,31,10,0.08);
    transition: all 0.2s;
    animation: fadeIn 0.3s ease;
  }

  .pedido-card.aguardando-horario {
    border: 2px solid var(--laranja);
    box-shadow: 0 4px 20px rgba(230,126,34,0.2);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pedido-card:hover {
    box-shadow: 0 8px 24px rgba(61,31,10,0.12);
    transform: translateY(-1px);
  }

  .pedido-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .pedido-id {
    font-size: 12px;
    color: var(--cinza);
    margin-bottom: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .pedido-cliente {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--marrom);
  }

  .pedido-telefone {
    font-size: 13px;
    color: var(--cinza);
    margin-top: 2px;
  }

  .status-badge {
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .status-aguardando_pagamento { background: #fef3cd; color: #856404; }
  .status-aguardando_horario { background: #ffe5cc; color: #a04000; }
  .status-confirmado { background: #d1e7dd; color: #0a3622; }
  .status-em_producao { background: #cfe2ff; color: #084298; }
  .status-pronto { background: #d0f0c0; color: #1a5f1a; }
  .status-entregue { background: #e2e3e5; color: #41464b; }
  .status-cancelado { background: #f8d7da; color: #842029; }

  .pedido-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .pedido-info {
    background: var(--creme);
    border-radius: 10px;
    padding: 12px 16px;
  }

  .pedido-info-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--cinza);
    margin-bottom: 4px;
  }

  .pedido-info-valor {
    font-size: 14px;
    color: var(--marrom);
    font-weight: 500;
  }

  .pedido-itens {
    background: var(--creme);
    border-radius: 10px;
    padding: 12px 16px;
    grid-column: 1 / -1;
  }

  .pedido-footer {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-status {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
  }

  .btn-confirmar { background: var(--verde); color: white; }
  .btn-confirmar:hover { background: #215c40; }
  .btn-confirmar-horario { background: var(--laranja); color: white; }
  .btn-confirmar-horario:hover { background: #ca6f1e; }
  .btn-cancelar-horario { background: transparent; color: var(--vermelho); border: 1px solid var(--vermelho); }
  .btn-cancelar-horario:hover { background: var(--vermelho); color: white; }
  .btn-producao { background: var(--azul); color: white; }
  .btn-producao:hover { background: #154360; }
  .btn-pronto { background: var(--caramelo); color: white; }
  .btn-pronto:hover { background: #a66d2e; }
  .btn-entregar { background: var(--cinza); color: white; }
  .btn-entregar:hover { background: #6d6460; }
  .btn-cancelar { background: transparent; color: var(--vermelho); border: 1px solid var(--vermelho); }
  .btn-cancelar:hover { background: var(--vermelho); color: white; }
  .btn-imprimir { background: var(--marrom); color: white; margin-left: auto; }
  .btn-imprimir:hover { background: #2d1608; }

  .valor-total {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--verde);
  }

  .agendamento-urgente { color: var(--vermelho); font-weight: 500; }

  .alerta-horario {
    background: #fff3e0;
    border: 1px solid var(--laranja);
    border-radius: 10px;
    padding: 10px 16px;
    margin-bottom: 12px;
    font-size: 13px;
    color: #a04000;
    font-weight: 500;
  }

  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--cinza);
  }

  .empty-state h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--marrom);
    margin-bottom: 8px;
  }

  .notificacao {
    position: fixed;
    top: 80px;
    right: 24px;
    background: var(--verde);
    color: white;
    padding: 16px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    transform: translateX(120%);
    transition: transform 0.3s ease;
    z-index: 999;
  }

  .notificacao.show { transform: translateX(0); }

  @media print {
    header, .stats, .filtros, .pedido-footer { display: none !important; }
    .pedido-card { box-shadow: none; border: 1px solid #ddd; }
  }

  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); padding: 16px; }
    .pedidos-container { padding: 0 16px 16px; }
    .filtros { padding: 0 16px 12px; }
    header { padding: 16px; }
    .pedido-body { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    Godoy
    <span>Painel de Pedidos</span>
  </div>
  <div class="header-right">
    <div class="data-hora" id="relogio"></div>
    <button class="btn-atualizar" onclick="carregarPedidos()">↻ Atualizar</button>
  </div>
</header>

<div class="stats" id="stats">
  <div class="stat-card aguardando">
    <div class="stat-numero" id="stat-aguardando">0</div>
    <div class="stat-label">Aguardando Pgto</div>
  </div>
  <div class="stat-card confirmado">
    <div class="stat-numero" id="stat-confirmado">0</div>
    <div class="stat-label">Confirmados</div>
  </div>
  <div class="stat-card pronto">
    <div class="stat-numero" id="stat-pronto">0</div>
    <div class="stat-label">Prontos</div>
  </div>
  <div class="stat-card entregue">
    <div class="stat-numero" id="stat-entregue">0</div>
    <div class="stat-label">Entregues Hoje</div>
  </div>
</div>

<div class="filtros">
  <button class="filtro-btn ativo" onclick="filtrar('todos', this)">Todos</button>
  <button class="filtro-btn" onclick="filtrar('aguardando_horario', this)">⏰ Aguard. Horário</button>
  <button class="filtro-btn" onclick="filtrar('aguardando_pagamento', this)">Aguardando Pgto</button>
  <button class="filtro-btn" onclick="filtrar('confirmado', this)">Confirmados</button>
  <button class="filtro-btn" onclick="filtrar('em_producao', this)">Em Produção</button>
  <button class="filtro-btn" onclick="filtrar('pronto', this)">Prontos</button>
  <button class="filtro-btn" onclick="filtrar('entregue', this)">Entregues</button>
</div>

<div class="pedidos-container" id="pedidos"></div>

<div class="notificacao" id="notificacao"></div>

<script>
let todosPedidos = [];
let filtroAtual = 'todos';
let ultimoTotal = 0;

// Som de notificação
function tocarSom() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = ctx.createOscillator();
    const gainNode = ctx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(ctx.destination);
    oscillator.frequency.setValueAtTime(880, ctx.currentTime);
    oscillator.frequency.setValueAtTime(660, ctx.currentTime + 0.1);
    oscillator.frequency.setValueAtTime(880, ctx.currentTime + 0.2);
    gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    oscillator.start(ctx.currentTime);
    oscillator.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

function relogio() {
  const agora = new Date();
  document.getElementById('relogio').textContent =
    agora.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' }) +
    ' — ' + agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

setInterval(relogio, 1000);
relogio();

async function carregarPedidos() {
  try {
    const res = await fetch('/api/pedidos');
    const novos = await res.json();

    // Toca som se chegou pedido novo
    if (ultimoTotal > 0 && novos.length > ultimoTotal) {
      tocarSom();
      mostrarNotificacao('🔔 Novo pedido recebido!');
    }

    // Alerta sonoro para pedidos aguardando horário
    const aguardandoHorario = novos.filter(p => p.status === 'aguardando_horario');
    if (aguardandoHorario.length > 0) {
      const prev = todosPedidos.filter(p => p.status === 'aguardando_horario').length;
      if (aguardandoHorario.length > prev) {
        tocarSom();
        setTimeout(tocarSom, 600);
        mostrarNotificacao('⏰ Pedido aguardando confirmação de horário!');
      }
    }

    ultimoTotal = novos.length;
    todosPedidos = novos;
    renderPedidos();
    atualizarStats();
  } catch (e) {
    console.error(e);
  }
}

function filtrar(status, btn) {
  filtroAtual = status;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  renderPedidos();
}

function renderPedidos() {
  const container = document.getElementById('pedidos');
  let pedidos = filtroAtual === 'todos'
    ? todosPedidos
    : todosPedidos.filter(p => p.status === filtroAtual);

  if (pedidos.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <h2>Nenhum pedido</h2>
        <p>Não há pedidos nesta categoria no momento.</p>
      </div>`;
    return;
  }

  container.innerHTML = pedidos.map(p => {
    const criado = new Date(p.criado_em);
    const agendado = p.data_agendamento ? new Date(p.data_agendamento) : null;
    const hoje = new Date();
    const diasAteAgendamento = agendado ? Math.ceil((agendado - hoje) / (1000*60*60*24)) : null;
    const urgente = diasAteAgendamento !== null && diasAteAgendamento <= 1;
    const isAguardandoHorario = p.status === 'aguardando_horario';

    return `
    <div class="pedido-card ${isAguardandoHorario ? 'aguardando-horario' : ''}" id="pedido-${p.id}">
      <div class="pedido-header">
        <div>
          <div class="pedido-id">#${p.id} · ${criado.toLocaleDateString('pt-BR')} ${criado.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</div>
          <div class="pedido-cliente">${p.nome_cliente || 'Cliente'}</div>
          <div class="pedido-telefone">📱 ${p.telefone || '—'}</div>
        </div>
        <span class="status-badge status-${p.status}">${traduzirStatus(p.status)}</span>
      </div>

      ${isAguardandoHorario ? `
      <div class="alerta-horario">
        ⏰ Pedido com menos de 4h de antecedência — confirme se consegue atender!
      </div>` : ''}

      <div class="pedido-body">
        <div class="pedido-info">
          <div class="pedido-info-label">Tipo</div>
          <div class="pedido-info-valor">${p.tipo === 'entrega' ? '🛵 Entrega' : '🏪 Retirada'}</div>
        </div>
        <div class="pedido-info">
          <div class="pedido-info-label">Valor Total</div>
          <div class="valor-total">R$ ${p.valor_total ? Number(p.valor_total).toFixed(2) : '—'}</div>
        </div>
        ${p.observacoes ? `
        <div class="pedido-info">
          <div class="pedido-info-label">Agendamento</div>
          <div class="pedido-info-valor ${urgente ? 'agendamento-urgente' : ''}">
            📅 ${p.observacoes}
          </div>
        </div>` : ''}
        ${p.forma_pagamento ? `
        <div class="pedido-info">
          <div class="pedido-info-label">Pagamento</div>
          <div class="pedido-info-valor">💳 ${p.forma_pagamento}</div>
        </div>` : ''}
        <div class="pedido-itens">
          <div class="pedido-info-label">Itens do Pedido</div>
          <div class="pedido-info-valor">${p.itens || '—'}</div>
        </div>
        ${p.endereco ? `
        <div class="pedido-itens">
          <div class="pedido-info-label">Endereço de Entrega</div>
          <div class="pedido-info-valor">📍 ${p.endereco}</div>
        </div>` : ''}
      </div>

      <div class="pedido-footer">
        ${isAguardandoHorario ? `
          <button class="btn-status btn-confirmar-horario" onclick="confirmarHorario(${p.id})">✓ Confirmar Horário</button>
          <button class="btn-status btn-cancelar-horario" onclick="cancelarHorario(${p.id})">✕ Não Conseguimos</button>
        ` : ''}
        ${p.status === 'aguardando_pagamento' ? `
          <button class="btn-status btn-confirmar" onclick="atualizarStatus(${p.id}, 'confirmado')">✓ Confirmar Pgto</button>
          <button class="btn-status btn-cancelar" onclick="atualizarStatus(${p.id}, 'cancelado')">✕ Cancelar</button>
        ` : ''}
        ${p.status === 'confirmado' ? `
          <button class="btn-status btn-producao" onclick="atualizarStatus(${p.id}, 'em_producao')">🔥 Em Produção</button>
        ` : ''}
        ${p.status === 'em_producao' ? `
          <button class="btn-status btn-pronto" onclick="atualizarStatus(${p.id}, 'pronto')">✓ Pronto</button>
        ` : ''}
        ${p.status === 'pronto' ? `
          <button class="btn-status btn-entregar" onclick="atualizarStatus(${p.id}, 'entregue')">📦 Entregue</button>
        ` : ''}
        <button class="btn-status btn-imprimir" onclick="imprimirPedido(${p.id})">🖨️ Imprimir</button>
      </div>
    </div>`;
  }).join('');
}

function traduzirStatus(s) {
  const t = {
    aguardando_horario: '⏰ Aguard. Horário',
    aguardando_pagamento: 'Aguardando Pgto',
    confirmado: 'Confirmado',
    em_producao: 'Em Produção',
    pronto: 'Pronto',
    entregue: 'Entregue',
    cancelado: 'Cancelado'
  };
  return t[s] || s;
}

async function atualizarStatus(id, novoStatus) {
  try {
    await fetch(`/api/pedidos/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: novoStatus })
    });
    mostrarNotificacao('Status atualizado com sucesso!');
    await carregarPedidos();
  } catch (e) {
    mostrarNotificacao('Erro ao atualizar status', true);
  }
}

async function confirmarHorario(id) {
  try {
    await fetch(`/api/pedidos/${id}/confirmar-horario`, { method: 'POST' });
    mostrarNotificacao('✅ Horário confirmado! Cliente foi avisado.');
    await carregarPedidos();
  } catch (e) {
    mostrarNotificacao('Erro ao confirmar horário', true);
  }
}

async function cancelarHorario(id) {
  try {
    await fetch(`/api/pedidos/${id}/cancelar-horario`, { method: 'POST' });
    mostrarNotificacao('Pedido cancelado. Cliente foi avisado.');
    await carregarPedidos();
  } catch (e) {
    mostrarNotificacao('Erro ao cancelar', true);
  }
}

function imprimirPedido(id) {
  const pedido = todosPedidos.find(p => p.id === id);
  if (!pedido) return;
  const janela = window.open('', '_blank');
  janela.document.write(`
    <html><head><title>Pedido #${pedido.id}</title>
    <style>
      body { font-family: monospace; font-size: 12px; width: 280px; }
      h2 { text-align: center; }
      hr { border: 1px dashed #000; }
      .linha { display: flex; justify-content: space-between; }
    </style></head><body>
    <h2>GODOY PADARIA</h2>
    <p style="text-align:center">R. Aquiles, 231 - Apucarana/PR</p>
    <hr>
    <p><b>Pedido #${pedido.id}</b></p>
    <p>Cliente: ${pedido.nome_cliente || '—'}</p>
    <p>Telefone: ${pedido.telefone || '—'}</p>
    <p>Tipo: ${pedido.tipo === 'entrega' ? 'ENTREGA' : 'RETIRADA'}</p>
    ${pedido.observacoes ? `<p>Agendamento: ${pedido.observacoes}</p>` : ''}
    ${pedido.endereco ? `<p>Endereço: ${pedido.endereco}</p>` : ''}
    <hr>
    <p><b>ITENS:</b></p>
    <p>${pedido.itens || '—'}</p>
    <hr>
    <div class="linha"><span>TOTAL:</span><span>R$ ${pedido.valor_total ? Number(pedido.valor_total).toFixed(2) : '—'}</span></div>
    <div class="linha"><span>Pagamento:</span><span>${pedido.forma_pagamento || '—'}</span></div>
    <hr>
    <p style="text-align:center">Obrigado pela preferência!</p>
    </body></html>`);
  janela.print();
}

function atualizarStats() {
  const contagem = {};
  todosPedidos.forEach(p => {
    contagem[p.status] = (contagem[p.status] || 0) + 1;
  });

  document.getElementById('stat-aguardando').textContent =
    (contagem['aguardando_pagamento'] || 0) + (contagem['aguardando_horario'] || 0);
  document.getElementById('stat-confirmado').textContent =
    (contagem['confirmado'] || 0) + (contagem['em_producao'] || 0);
  document.getElementById('stat-pronto').textContent = contagem['pronto'] || 0;

  const hoje = new Date().toDateString();
  const entreguesHoje = todosPedidos.filter(p =>
    p.status === 'entregue' && new Date(p.criado_em).toDateString() === hoje
  ).length;
  document.getElementById('stat-entregue').textContent = entreguesHoje;
}

function mostrarNotificacao(msg, erro = false) {
  const el = document.getElementById('notificacao');
  el.textContent = msg;
  el.style.background = erro ? '#c1392b' : '#2d6a4f';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Atualiza automaticamente a cada 15 segundos
setInterval(carregarPedidos, 15000);
carregarPedidos();
